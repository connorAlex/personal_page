<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Connor Cochrane is a software developer and photographer."
    />
    <title>Connor Cochrane | Developer & Photographer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Helvetica Neue", "Arial", "sans-serif"],
              display: ["Helvetica Neue", "Inter", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-neutral-950 text-neutral-100 antialiased">
    <main class="mx-auto flex min-h-screen max-w-7xl flex-col px-5 py-5 sm:px-8">
      <header
        class="flex flex-col gap-3 border-b border-white/10 pb-5 text-[0.68rem] font-medium uppercase tracking-[0.22em] sm:flex-row sm:items-center sm:justify-between"
      >
        <a href="index.html" class="text-white">Connor Cochrane</a>
        <nav
          class="flex flex-wrap gap-4 text-neutral-300 sm:gap-7"

        >
          <a class="transition hover:text-white" href="portfolio.html">Work</a>
          <a class="transition hover:text-white" href="photography.html">Photography</a>
          <a
            class="transition hover:text-white"
            href="./Connor Cochrane Resume.pdf"
            target="_blank"
            rel="noreferrer"
            >Resume</a
          >
          <a class="transition hover:text-white" href="mailto:connor.alex.cochrane@gmail.com">Contact</a>
        </nav>
      </header>

      <section class="grid flex-1 items-center gap-10 py-10 lg:grid-cols-[1.15fr_0.85fr]">
        <div>
          <p
            class="mb-5 text-[0.68rem] font-semibold uppercase tracking-[0.3em] text-neutral-500"
          >
            Developer / Photographer
          </p>
          <h1
            class="font-display text-5xl font-semibold uppercase leading-[0.9] tracking-normal text-white sm:text-7xl lg:text-8xl"
          >
            Connor Cochrane
          </h1>
          <p class="mt-7 max-w-2xl text-lg leading-8 text-neutral-300 sm:text-xl">
            I build focused web experiences and make photographs with an eye for
            clarity, composition, and restraint.
          </p>
        </div>

        <div class="grid gap-3 text-[0.68rem] font-semibold uppercase tracking-[0.22em]">
            <a
              class="group flex items-center justify-between border-y border-white/15 py-5 text-white transition hover:border-white"
              href="portfolio.html"
            >
              <span>Selected Work</span>
              <span class="text-neutral-500 transition group-hover:text-white">View</span>
            </a>
            <a
              class="group flex items-center justify-between border-b border-white/15 py-5 text-white transition hover:border-white"
              href="photography.html"
            >
              <span>Photography</span>
              <span class="text-neutral-500 transition group-hover:text-white">Gallery</span>
            </a>
            <a
              class="group flex items-center justify-between border-b border-white/15 py-5 text-white transition hover:border-white"
              href="./Connor Cochrane Resume.pdf"
              target="_blank"
              rel="noreferrer"
            >
              <span>Resume</span>
              <span class="text-neutral-500 transition group-hover:text-white">PDF</span>
            </a>
        </div>
      </section>

      <footer
        class="flex flex-col gap-4 border-t border-white/10 pt-5 text-[0.68rem] font-semibold uppercase tracking-[0.22em] text-neutral-400 sm:flex-row sm:items-center sm:justify-between"
      >
        <a
          class="break-all transition hover:text-white"
          href="mailto:connor.alex.cochrane@gmail.com"
          >connor.alex.cochrane@gmail.com</a
        >
        <div class="flex gap-5">
          <a
            class="transition hover:text-white"
            href="https://github.com/connorAlex"
            target="_blank"
            rel="noreferrer"
            >GitHub</a
          >
          <a
            class="transition hover:text-white"
            href="https://www.linkedin.com/in/connor-a-cochrane/"
            target="_blank"
            rel="noreferrer"
            >LinkedIn</a
          >
        </div>
      </footer>

</html>
