<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Selected photography by Connor Cochrane."
    />
    <title>Photography | Connor Cochrane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Helvetica Neue", "Arial", "sans-serif"],
              display: ["Helvetica Neue", "Inter", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-neutral-950 text-neutral-100 antialiased">
    <header
      class="fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-neutral-950/85 backdrop-blur"
    >
      <nav
        class="mx-auto flex max-w-7xl flex-col items-center justify-between gap-3 px-5 py-4 text-[0.68rem] font-medium uppercase tracking-[0.22em] sm:flex-row sm:px-8"
        aria-label="Primary navigation"
      >
        <a href="index.html" class="text-neutral-50">Connor Cochrane</a>
        <div class="flex flex-wrap items-center justify-center gap-4 text-neutral-300 sm:gap-7">
          <a class="transition hover:text-white" href="index.html#work">Work</a>
          <a class="text-white" href="photography.html" aria-current="page">Photography</a>
          <a
            class="transition hover:text-white"
            href="./Connor Cochrane Resume.pdf"
            target="_blank"
            rel="noreferrer"
            >Resume</a
          >
          <a class="transition hover:text-white" href="index.html#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="mx-auto max-w-7xl px-5 pb-14 pt-36 sm:px-8 sm:pt-28 lg:pt-36">
        <div class="grid gap-8 border-b border-white/10 pb-10 lg:grid-cols-[1.2fr_0.8fr]">
          <div>
            <p
              class="text-[0.68rem] font-semibold uppercase tracking-[0.3em] text-neutral-500"
            >
              Selected Photography
            </p>
            <h1
              class="mt-5 font-display text-5xl font-semibold uppercase leading-[0.9] tracking-normal text-white sm:text-7xl lg:text-8xl"
            >
              Gallery
            </h1>
          </div>
          <p class="max-w-xl self-end leading-7 text-neutral-300">
            A curated page for film, travel, street, and personal photography.
            Replace the placeholders with final images and captions as the set
            takes shape.
          </p>
        </div>
      </section>

      <section class="mx-auto max-w-7xl px-5 pb-24 sm:px-8">
        <div class="grid gap-4 md:grid-cols-12">
          <figure class="md:col-span-7">
            <div class="aspect-[5/4] bg-neutral-800"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 01 / Location
            </figcaption>
          </figure>

          <figure class="md:col-span-5 md:pt-24">
            <div class="aspect-[4/5] bg-neutral-700"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 02 / Location
            </figcaption>
          </figure>

          <figure class="md:col-span-4">
            <div class="aspect-[3/4] bg-neutral-800"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 03 / Location
            </figcaption>
          </figure>

          <figure class="md:col-span-8">
            <div class="aspect-[16/10] bg-neutral-700"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 04 / Location
            </figcaption>
          </figure>

          <figure class="md:col-span-6 md:pt-16">
            <div class="aspect-square bg-neutral-800"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 05 / Location
            </figcaption>
          </figure>

          <figure class="md:col-span-6">
            <div class="aspect-[4/5] bg-neutral-700"></div>
            <figcaption
              class="mt-3 text-[0.62rem] font-semibold uppercase tracking-[0.22em] text-neutral-500"
            >
              Image 06 / Location
            </figcaption>
          </figure>
        </div>
      </section>

      <footer class="border-t border-white/10">
        <div
          class="mx-auto flex max-w-7xl flex-col gap-4 px-5 py-8 text-[0.68rem] font-semibold uppercase tracking-[0.22em] text-neutral-400 sm:flex-row sm:items-center sm:justify-between sm:px-8"
        >
          <a class="transition hover:text-white" href="index.html">Back Home</a>
          <div class="flex gap-5">
            <a class="transition hover:text-white" href="mailto:connor.alex.cochrane@gmail.com">Email</a>
            <a class="transition hover:text-white" href="https://github.com/connorAlex" target="_blank" rel="noreferrer">GitHub</a>
            <a class="transition hover:text-white" href="https://www.linkedin.com/in/connor-a-cochrane/" target="_blank" rel="noreferrer">LinkedIn</a>
          </div>
        </div>
      </footer>
    </main>
  </body>
</html>
